syntax = "proto3";

package com.mkihr_ojisan.minecraftd.bridge.common.protocol;

message Request {
    oneof payload {
        GetServerMetricsRequest get_server_metrics_request = 1;
    }
}

message Response {
    oneof payload {
        ErrorResponse error_response = 1;
        GetServerMetricsResponse get_server_metrics_response = 2;
    }
}

message ErrorResponse {
    string message = 1;
}

message GetServerMetricsRequest {
}

message GetServerMetricsResponse {
    ServerMetrics server_metrics = 1;
}

message ServerMetrics {
    optional double tps = 1;
    optional double mspt = 2;
    optional uint32 player_count = 3;
    optional uint32 entity_count = 4;
    optional uint32 loaded_chunk_count = 5;
    optional uint64 allocated_memory = 6;
    optional uint64 used_memory = 7;
}
